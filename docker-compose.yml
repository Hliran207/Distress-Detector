services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/reddit_distress_db}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DEFAULT_TELEGRAM_CHAT_ID: ${DEFAULT_TELEGRAM_CHAT_ID}
      TELEGRAM_AUTO_SCAN_ENABLED: ${TELEGRAM_AUTO_SCAN_ENABLED:-true}
      TELEGRAM_AUTO_SCAN_INTERVAL_S: ${TELEGRAM_AUTO_SCAN_INTERVAL_S:-60}
      TELEGRAM_AUTO_SCAN_LIMIT: ${TELEGRAM_AUTO_SCAN_LIMIT:-100}
      HF_REPO: ${HF_REPO:-Hliran2/distilbert-distress-detector}
      HF_HOME: /home/app/.cache/huggingface
    volumes:
      # Cache persists between restarts — models download once only
      - hf_cache:/home/app/.cache/huggingface
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  hf_cache:
